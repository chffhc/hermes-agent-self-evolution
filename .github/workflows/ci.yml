name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff black isort

      - name: Check syntax (all Python files compile)
        run: |
          python -m compileall evolution/ tests/ run_evolution.py generate_report.py

      - name: Lint with ruff
        run: ruff check evolution/ tests/ --output-format=github
        continue-on-error: true

      - name: Check formatting with black
        run: black --check --diff evolution/ tests/
        continue-on-error: true

      - name: Run import checks
        run: |
          python -c "import evolution; import evolution.core; import evolution.skills; import evolution.tools; import evolution.prompts"
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true
